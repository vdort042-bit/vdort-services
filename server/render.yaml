services:
  - type: web
    name: vdort-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://vdort-services.vercel.app
      - key: ALLOWED_ORIGINS
        value: https://vdort-services.vercel.app
      - key: FIREBASE_PROJECT_ID
        value: vdort-28207
      - key: FIREBASE_CLIENT_EMAIL
        value: firebase-adminsdk-fbsvc@vdort-28207.iam.gserviceaccount.com
      - key: FIREBASE_STORAGE_BUCKET
        value: vdort-28207.firebasestorage.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: vdort042@gmail.com
      - key: ADMIN_EMAIL
        value: vdort042@gmail.com
      # Set these manually in Render Dashboard → Environment (secrets):
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: SMTP_PASS
        sync: false
